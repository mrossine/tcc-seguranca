<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Perfil - Segurança Fatec ZL</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
.sidebar {
	min-height: 100vh;
	background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
	color: white;
}

.sidebar a {
	color: rgba(255, 255, 255, 0.8);
	text-decoration: none;
	padding: 10px 15px;
	display: block;
	transition: all 0.3s;
}

.sidebar a:hover, .sidebar a.active {
	background: rgba(255, 255, 255, 0.2);
	color: white;
	border-radius: 10px;
}

.profile-avatar {
	width: 150px;
	height: 150px;
	border-radius: 50%;
	object-fit: cover;
	border: 4px solid #667eea;
}

.nav-tabs .nav-link {
	color: #667eea;
	font-weight: 500;
}

.nav-tabs .nav-link.active {
	background-color: #667eea;
	color: white;
	border-color: #667eea;
}
</style>
</head>
<body>
	<div class="container-fluid">
		<div class="row">
			<!-- Sidebar -->
			<div class="col-md-3 col-lg-2 px-0 sidebar">
				<div class="text-center py-4">
					<i class="bi bi-shield-shaded display-3"></i>
					<h4 class="mt-2">Segurança Fatec ZL</h4>
				</div>
				<nav class="nav flex-column px-3">
					<a href="/dashboard"> <i class="bi bi-house-door"></i> Dashboard
					</a> 
					<a href="/alertas"> <i class="bi bi-exclamation-triangle"></i> Alertas
					</a> 
					<a href="/caronas"> <i class="bi bi-car-front"></i> Caronas
					</a> 
					<a href="/estatisticas"> <i class="bi bi-bar-chart"></i> Estatísticas
					</a> 
					<a href="/perfil" class="active"> <i class="bi bi-person"></i> Meu Perfil
					</a> 
					<a sec:authorize="hasRole('ADMIN')" href="/admin/usuarios" class="nav-link">
					<i class="bi bi-shield-lock"></i> Admin
					</a>
					<a href="/logout"><i class="bi bi-box-arrow-right"></i> Sair</a>
				</nav>
			</div>

			<!-- Main Content -->
			<div class="col-md-9 col-lg-10 px-4 py-3">
				<div class="d-flex justify-content-between align-items-center mb-4">
					<h2>Meu Perfil</h2>
					<div>
						<span class="badge bg-success p-2"> <i
							class="bi bi-person-circle"></i> <span sec:authentication="name"></span>
						</span>
					</div>
				</div>

				<div class="row">
					<div class="col-md-4 mb-4">
						<div class="card text-center">
							<div class="card-body">
								<img th:src="${usuario.fotoPerfil != null ? usuario.fotoPerfil : 'https://via.placeholder.com/150'}" 
								     class="profile-avatar mb-3" alt="Avatar">
								<h4 th:text="${usuario.nomeCompleto}">Nome</h4>
								<p class="text-muted" th:text="${usuario.email}">email@fatec.sp.gov.br</p>
								<span class="badge bg-primary" th:text="${usuario.curso}">Curso</span>
								<span class="badge bg-secondary" th:text="${usuario.periodo}">Período</span>
								<hr>
								<p class="text-muted small">
									<i class="bi bi-calendar"></i> Cadastrado em: 
									<span th:text="${#temporals.format(usuario.dataCadastro, 'dd/MM/yyyy')}">Data</span>
								</p>
							</div>
						</div>
					</div>

					<div class="col-md-8">
						<ul class="nav nav-tabs" id="profileTab" role="tablist">
							<li class="nav-item">
								<button class="nav-link active" id="dados-tab" data-bs-toggle="tab" data-bs-target="#dados" type="button">Dados Pessoais</button>
							</li>
							<li class="nav-item">
								<button class="nav-link" id="senha-tab" data-bs-toggle="tab" data-bs-target="#senha" type="button">Alterar Senha</button>
							</li>
							<li class="nav-item">
								<button class="nav-link" id="historico-tab" data-bs-toggle="tab" data-bs-target="#historico" type="button">Histórico</button>
							</li>
						</ul>
						<div class="tab-content p-3 border border-top-0 rounded-bottom bg-white">
							<!-- Dados Pessoais -->
							<div class="tab-pane fade show active" id="dados">
								<form th:action="@{/perfil/atualizar}" method="post">
									<div class="mb-3">
										<label class="form-label">Nome Completo</label>
										<input type="text" class="form-control" name="nomeCompleto" th:value="${usuario.nomeCompleto}" required>
									</div>
									<div class="mb-3">
										<label class="form-label">E-mail</label>
										<input type="email" class="form-control" th:value="${usuario.email}" disabled>
									</div>
									<div class="mb-3">
										<label class="form-label">Matrícula</label>
										<input type="text" class="form-control" th:value="${usuario.matricula}" disabled>
									</div>
									<div class="mb-3">
										<label class="form-label">Curso</label>
										<select class="form-select" name="curso" required>
											<option th:selected="${usuario.curso == 'Análise e Desenvolvimento de Sistemas'}" value="Análise e Desenvolvimento de Sistemas">Análise e Desenvolvimento de Sistemas</option>
											<option th:selected="${usuario.curso == 'Gestão da Tecnologia da Informação'}" value="Gestão da Tecnologia da Informação">Gestão da Tecnologia da Informação</option>
											<option th:selected="${usuario.curso == 'Sistemas para Internet'}" value="Sistemas para Internet">Sistemas para Internet</option>
											<option th:selected="${usuario.curso == 'Banco de Dados'}" value="Banco de Dados">Banco de Dados</option>
											<option th:selected="${usuario.curso == 'Jogos Digitais'}" value="Jogos Digitais">Jogos Digitais</option>
											<option th:selected="${usuario.curso == 'Outro'}" value="Outro">Outro</option>
										</select>
									</div>
									<div class="mb-3">
										<label class="form-label">Período</label>
										<select class="form-select" name="periodo" required>
											<option th:selected="${usuario.periodo == 'MANHA'}" value="MANHA">Manhã</option>
											<option th:selected="${usuario.periodo == 'TARDE'}" value="TARDE">Tarde</option>
											<option th:selected="${usuario.periodo == 'NOITE'}" value="NOITE">Noite</option>
										</select>
									</div>
									<button type="submit" class="btn btn-primary">Salvar Alterações</button>
								</form>
							</div>

							<!-- Alterar Senha -->
							<div class="tab-pane fade" id="senha">
								<form th:action="@{/perfil/alterar-senha}" method="post">
									<div class="mb-3">
										<label class="form-label">Senha Atual</label>
										<input type="password" class="form-control" name="senhaAtual" required>
									</div>
									<div class="mb-3">
										<label class="form-label">Nova Senha</label>
										<input type="password" class="form-control" id="novaSenha" name="novaSenha" required minlength="6">
									</div>
									<div class="mb-3">
										<label class="form-label">Confirmar Nova Senha</label>
										<input type="password" class="form-control" id="confirmarSenha" required>
									</div>
									<button type="submit" class="btn btn-warning">Alterar Senha</button>
								</form>
							</div>

							<!-- Histórico -->
							<div class="tab-pane fade" id="historico">
								<h5>Meus Alertas</h5>
								<div id="meusAlertas" class="mb-4">
									<p class="text-muted">Carregando...</p>
								</div>
								<hr>
								<h5>Minhas Caronas</h5>
								<div id="minhasCaronas">
									<p class="text-muted">Carregando...</p>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script>
        // Validação de confirmação de senha
        const novaSenha = document.getElementById('novaSenha');
        const confirmarSenha = document.getElementById('confirmarSenha');
        confirmarSenha.addEventListener('input', function() {
            if (this.value !== novaSenha.value) {
                this.setCustomValidity('As senhas não coincidem');
            } else {
                this.setCustomValidity('');
            }
        });

        // Carregar histórico
        fetch('/api/usuario/historico/alertas')
            .then(res => res.json())
            .then(alertas => {
                const container = document.getElementById('meusAlertas');
                if (!alertas.length) {
                    container.innerHTML = '<p class="text-muted">Nenhum alerta publicado.</p>';
                } else {
                    container.innerHTML = alertas.map(a => `
                        <div class="card mb-2"><div class="card-body py-2">
                            <strong>${a.titulo}</strong>
                            <small class="text-muted float-end">${new Date(a.dataCriacao).toLocaleDateString()}</small>
                            <p class="mb-0 small">${a.descricao || ''}</p>
                        </div></div>
                    `).join('');
                }
            });

        fetch('/api/usuario/historico/caronas')
            .then(res => res.json())
            .then(caronas => {
                const container = document.getElementById('minhasCaronas');
                if (!caronas.length) {
                    container.innerHTML = '<p class="text-muted">Nenhuma carona oferecida ou solicitada.</p>';
                } else {
                    container.innerHTML = caronas.map(c => `
                        <div class="card mb-2"><div class="card-body py-2">
                            <strong>${c.origem} → ${c.destino}</strong>
                            <small class="text-muted float-end">${new Date(c.horarioSaida).toLocaleDateString()}</small>
                            <p class="mb-0 small">Status: ${c.status}</p>
                        </div></div>
                    `).join('');
                }
            });
    </script>
</body>
</html>
