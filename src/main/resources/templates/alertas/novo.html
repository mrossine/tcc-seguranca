<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novo Alerta - Segurança Fatec ZL</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
.sidebar {
	min-height: 100vh;
	background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
	color: white;
}

.sidebar a {
	color: rgba(255, 255, 255, 0.8);
	text-decoration: none;
	padding: 10px 15px;
	display: block;
	transition: all 0.3s;
}

.sidebar a:hover, .sidebar a.active {
	background: rgba(255, 255, 255, 0.2);
	color: white;
	border-radius: 10px;
}

.alert-type-card {
	cursor: pointer;
	transition: 0.3s;
	border: 2px solid transparent;
}

.alert-type-card.selected {
	border-color: #667eea;
	background-color: #f0f0ff;
}

.btn-submit {
	background: linear-gradient(135deg, #667eea, #764ba2);
	border: none;
	padding: 12px 30px;
	border-radius: 25px;
	font-weight: bold;
}

.btn-submit:hover {
	transform: scale(1.05);
}
</style>
</head>
<body>
	<div class="container-fluid">
		<div class="row">
			<!-- Sidebar -->
			<div class="col-md-3 col-lg-2 px-0 sidebar">
				<div class="text-center py-4">
					<i class="bi bi-shield-shaded display-3"></i>
					<h4 class="mt-2">Segurança Fatec ZL</h4>
				</div>
				<nav class="nav flex-column px-3">
					<a href="/dashboard"> <i class="bi bi-house-door"></i> Dashboard
					</a> 
					<a href="/alertas" class="active"> <i class="bi bi-exclamation-triangle"></i> Alertas
					</a> 
					<a href="/caronas"> <i class="bi bi-car-front"></i> Caronas
					</a> 
					<a href="/estatisticas"> <i class="bi bi-bar-chart"></i> Estatísticas
					</a> 
					<a href="/perfil"> <i class="bi bi-person"></i> Meu Perfil
					</a> 
					<a href="/logout"> <i class="bi bi-box-arrow-right"></i> Sair
					</a>
				</nav>
			</div>

			<!-- Main Content -->
			<div class="col-md-9 col-lg-10 px-4 py-3">
				<div class="d-flex justify-content-between align-items-center mb-4">
					<h2>Novo Alerta</h2>
					<div>
						<span class="badge bg-success p-2"> <i
							class="bi bi-person-circle"></i> <span sec:authentication="name"></span>
						</span>
					</div>
				</div>

				<div class="card">
					<div class="card-body p-4">
						<form id="alertaForm" method="post" th:action="@{/alertas/novo}" th:object="${alerta}">
							<div class="mb-4">
								<label class="fw-bold">Tipo de Ocorrência</label>
								<div class="row g-3">
									<div class="col-md-4">
										<div class="card alert-type-card text-center p-3" data-tipo="FURTO">
											<i class="bi bi-currency-dollar display-4 text-danger"></i>
											<h6>Furto</h6>
										</div>
									</div>
									<div class="col-md-4">
										<div class="card alert-type-card text-center p-3" data-tipo="ROUBO">
											<i class="bi bi-exclamation-octagon display-4 text-danger"></i>
											<h6>Roubo</h6>
										</div>
									</div>
									<div class="col-md-4">
										<div class="card alert-type-card text-center p-3" data-tipo="ATIVIDADE_SUSPEITA">
											<i class="bi bi-eye-slash display-4 text-warning"></i>
											<h6>Atividade Suspeita</h6>
										</div>
									</div>
									<div class="col-md-4">
										<div class="card alert-type-card text-center p-3" data-tipo="FALTA_ILUMINACAO">
											<i class="bi bi-lightbulb-off display-4 text-secondary"></i>
											<h6>Falta de Iluminação</h6>
										</div>
									</div>
									<div class="col-md-4">
										<div class="card alert-type-card text-center p-3" data-tipo="OUTRO">
											<i class="bi bi-chat-dots display-4 text-info"></i>
											<h6>Outro</h6>
										</div>
									</div>
								</div>
								<input type="hidden" th:field="*{tipo}" id="tipoAlerta" required>
								<div class="invalid-feedback">Selecione um tipo de ocorrência</div>
							</div>

							<div class="mb-3">
								<label class="fw-bold">Título</label>
								<input type="text" class="form-control" th:field="*{titulo}" required>
							</div>
							<div class="mb-3">
								<label class="fw-bold">Descrição</label>
								<textarea class="form-control" th:field="*{descricao}" rows="4"></textarea>
							</div>
							<div class="mb-3">
								<label class="fw-bold"><i class="bi bi-geo-alt"></i> Localização</label>
								<input type="text" class="form-control" th:field="*{localizacao}" required>
							</div>
							<input type="hidden" th:field="*{latitude}" id="latitude">
							<input type="hidden" th:field="*{longitude}" id="longitude">
							<div class="mb-3">
								<label class="fw-bold">Data e Hora</label>
								<input type="datetime-local" class="form-control" th:field="*{dataHora}" required>
							</div>

							<div class="alert alert-warning">
								<i class="bi bi-info-circle"></i> Alertas falsos serão removidos e podem resultar em suspensão da conta.
							</div>
							<button type="submit" class="btn btn-submit"><i class="bi bi-send"></i> Publicar Alerta</button>
							<a href="/alertas" class="btn btn-secondary">Cancelar</a>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script>
        const cards = document.querySelectorAll('.alert-type-card');
        const tipoInput = document.getElementById('tipoAlerta');
        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                tipoInput.value = card.dataset.tipo;
            });
        });

        document.getElementById('alertaForm').addEventListener('submit', function(event) {
            if (!tipoInput.value) {
                event.preventDefault();
                alert('Selecione um tipo de ocorrência');
                return;
            }
        });
    </script>
</body>
</html>
