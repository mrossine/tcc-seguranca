<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin - Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .sidebar a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 10px 15px;
            display: block;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 10px;
        }
        .table-responsive {
            margin-top: 20px;
        }
        .filtros-card {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .pagination {
            justify-content: center;
            margin-top: 20px;
        }
        .sidebar .logout-btn {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 10px 15px;
            display: block;
            transition: all 0.3s;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            font-size: 1rem;
        }
        .sidebar .logout-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 px-0 sidebar">
            <div class="text-center py-4">
                <i class="bi bi-shield-shaded display-3"></i>
                <h4 class="mt-2">Segurança Fatec ZL</h4>
            </div>
            <nav class="nav flex-column px-3">
                <a href="/dashboard"><i class="bi bi-house-door"></i> Dashboard</a>
                <a href="/alertas"><i class="bi bi-exclamation-triangle"></i> Alertas</a>
                <a href="/caronas"><i class="bi bi-car-front"></i> Caronas</a>
                <a href="/estatisticas"><i class="bi bi-bar-chart"></i> Estatísticas</a>
                <a href="/perfil"><i class="bi bi-person"></i> Meu Perfil</a>
                <a href="/admin/usuarios" class="active"><i class="bi bi-shield-lock"></i> Admin</a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="logout-btn">
                        <i class="bi bi-box-arrow-right"></i> Sair
                    </button>
                </form>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="col-md-9 col-lg-10 px-4 py-3">
            <h2><i class="bi bi-people"></i> Gerenciar Usuários</h2>

            <!-- Filtros -->
            <div class="filtros-card">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-control" id="filtroNome" placeholder="Buscar por nome...">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Email</label>
                        <input type="text" class="form-control" id="filtroEmail" placeholder="Buscar por email...">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Curso</label>
                        <input type="text" class="form-control" id="filtroCurso" placeholder="Buscar por curso...">
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <button class="btn btn-primary" onclick="aplicarFiltros()">
                            <i class="bi bi-search"></i> Pesquisar
                        </button>
                        <button class="btn btn-secondary" onclick="limparFiltros()">
                            <i class="bi bi-eraser"></i> Limpar
                        </button>
                    </div>
                </div>
            </div>

            <!-- Tabela de usuários -->
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                    <tr><th>Nome</th><th>Email</th><th>Curso</th><th>Ação</th></tr>
                    </thead>
                    <tbody id="listaUsuarios">
                    <tr><td colspan="4" class="text-center">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Paginação -->
            <nav>
                <ul class="pagination" id="paginacao"></ul>
            </nav>

            <button class="btn btn-info mt-3" onclick="totalProcedure()">
                <i class="bi bi-database"></i> Total de usuários cadastrados no sistema
            </button>
            <div id="resultProc" class="mt-2"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let paginaAtual = 0;
    let totalPaginas = 0;

    function carregarUsuarios() {
        const nome = document.getElementById('filtroNome').value;
        const email = document.getElementById('filtroEmail').value;
        const curso = document.getElementById('filtroCurso').value;

        let url = `/api/admin/usuarios?page=${paginaAtual}&size=10`;
        if (nome) url += `&nome=${encodeURIComponent(nome)}`;
        if (email) url += `&email=${encodeURIComponent(email)}`;
        if (curso) url += `&curso=${encodeURIComponent(curso)}`;

        fetch(url)
            .then(res => res.json())
            .then(page => {
                totalPaginas = page.totalPages;
                const tbody = document.getElementById('listaUsuarios');
                if (!page.content || page.content.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center">Nenhum usuário encontrado</td></tr>';
                    document.getElementById('paginacao').innerHTML = '';
                    return;
                }
                tbody.innerHTML = page.content.map(u => `
                    <tr>
                        <td>${u.nomeCompleto || ''}</td>
                        <td>${u.email || ''}</td>
                        <td>${u.curso || ''}</td>
                        <td>
                            <button onclick="excluir(${u.id})" class="btn btn-danger btn-sm">
                                <i class="bi bi-trash"></i> Excluir
                            </button>
                        </td>
                    </tr>
                `).join('');
                renderizarPaginacao();
            })
            .catch(error => {
                console.error('Erro:', error);
                document.getElementById('listaUsuarios').innerHTML = '<tr><td colspan="4" class="text-danger">Erro ao carregar usuários</td></tr>';
            });
    }

    function renderizarPaginacao() {
        const paginationDiv = document.getElementById('paginacao');
        if (totalPaginas <= 1) {
            paginationDiv.innerHTML = '';
            return;
        }
        let html = '';
        // Botão anterior
        html += `<li class="page-item ${paginaAtual === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="mudarPagina(${paginaAtual - 1})">Anterior</a>
                 </li>`;
        // Números das páginas (mostrar no máximo 5)
        let inicio = Math.max(0, paginaAtual - 2);
        let fim = Math.min(totalPaginas - 1, inicio + 4);
        for (let i = inicio; i <= fim; i++) {
            html += `<li class="page-item ${i === paginaAtual ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="mudarPagina(${i})">${i + 1}</a>
                     </li>`;
        }
        // Botão próximo
        html += `<li class="page-item ${paginaAtual >= totalPaginas - 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="mudarPagina(${paginaAtual + 1})">Próximo</a>
                 </li>`;
        paginationDiv.innerHTML = html;
    }

    function mudarPagina(novaPagina) {
        if (novaPagina < 0 || novaPagina >= totalPaginas) return;
        paginaAtual = novaPagina;
        carregarUsuarios();
    }

    function aplicarFiltros() {
        paginaAtual = 0;
        carregarUsuarios();
    }

    function limparFiltros() {
        document.getElementById('filtroNome').value = '';
        document.getElementById('filtroEmail').value = '';
        document.getElementById('filtroCurso').value = '';
        aplicarFiltros();
    }

    function excluir(id) {
        if (confirm('⚠️ Excluir usuário permanentemente? Essa ação não pode ser desfeita.')) {
            fetch(`/api/admin/usuarios/${id}`, {
                method: 'DELETE',
                credentials: 'same-origin'
            })
                .then(res => {
                    if (res.ok) {
                        alert('Usuário excluído com sucesso!');
                        carregarUsuarios();
                    } else {
                        return res.json().then(err => { throw new Error(err.error || 'Erro ao excluir'); });
                    }
                })
                .catch(error => {
                    alert('Erro: ' + error.message);
                });
        }
    }

    function totalProcedure() {
        fetch('/api/admin/sp-total-usuarios')
            .then(res => res.json())
            .then(data => {
                document.getElementById('resultProc').innerHTML = `<div class="alert alert-success"><strong>Total de usuários: ${data.total}</strong></div>`;
            })
            .catch(error => {
                document.getElementById('resultProc').innerHTML = `<div class="alert alert-danger">Erro ao chamar procedure</div>`;
            });
    }

    carregarUsuarios();
</script>
</body>
</html>
