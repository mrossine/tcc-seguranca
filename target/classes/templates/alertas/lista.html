<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alertas - Segurança Fatec ZL</title>
<!-- FIX 3/4: Meta tag para o CSRF token - necessário para POST via fetch -->
<meta name="_csrf" th:content="${_csrf.token}"/>
<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<!-- Leaflet.js — CSS deve ficar no <head> para o mapa renderizar corretamente -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
<style>
.sidebar {
	min-height: 100vh;
	background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
	color: white;
}

.sidebar a {
	color: rgba(255, 255, 255, 0.8);
	text-decoration: none;
	padding: 10px 15px;
	display: block;
	transition: all 0.3s;
}

.sidebar a:hover, .sidebar a.active {
	background: rgba(255, 255, 255, 0.2);
	color: white;
	border-radius: 10px;
}

.alert-card {
	border-left: 4px solid #6c757d;
	transition: transform 0.3s;
}

.alert-card:hover {
	transform: translateY(-3px);
}

.filter-card {
	background-color: #f8f9fa;
	border: none;
	border-radius: 10px;
}

.badge-furto {
	background-color: #dc3545;
}

.badge-roubo {
	background-color: #dc3545;
}

.badge-atividade-suspeita {
	background-color: #ffc107;
	color: #000;
}

.badge-falta-iluminacao {
	background-color: #6c757d;
}

.badge-outro {
	background-color: #17a2b8;
}

.btn-sm {
	font-size: 0.78rem;
}

.sidebar .logout-btn {
	color: rgba(255, 255, 255, 0.8);
	text-decoration: none;
	padding: 10px 15px;
	display: block;
	transition: all 0.3s;
	width: 100%;
	text-align: left;
	background: none;
	border: none;
	font-size: 1rem;
}

.sidebar .logout-btn:hover {
	background: rgba(255, 255, 255, 0.2);
	color: white;
	border-radius: 10px;
}
</style>
</head>
<body>
	<div class="container-fluid">
		<div class="row">
			<!-- Sidebar -->
			<div class="col-md-3 col-lg-2 px-0 sidebar">
				<div class="text-center py-4">
					<i class="bi bi-shield-shaded display-3"></i>
					<h4 class="mt-2">Segurança Fatec ZL</h4>
				</div>
				<nav class="nav flex-column px-3">
					<a href="/dashboard"> <i class="bi bi-house-door"></i> Dashboard</a>
					<a href="/alertas" class="active"> <i class="bi bi-exclamation-triangle"></i> Alertas</a>
					<a href="/caronas"> <i class="bi bi-car-front"></i> Caronas</a>
					<a href="/estatisticas"> <i class="bi bi-bar-chart"></i> Estatísticas</a>
					<a href="/onibus"><i class="bi bi-bus-front-fill"></i> Ônibus em Tempo Real</a>
					<a href="/perfil"> <i class="bi bi-person"></i> Meu Perfil</a>
					<a sec:authorize="hasRole('ADMIN')" href="/admin/usuarios" class="nav-link">
						<i class="bi bi-shield-lock"></i> Admin
					</a>
					<form th:action="@{/logout}" method="post">
						<button type="submit" class="logout-btn">
							<i class="bi bi-box-arrow-right"></i> Sair
						</button>
					</form>
				</nav>
			</div>

			<!-- Main Content -->
			<div class="col-md-9 col-lg-10 px-4 py-3">
				<div class="d-flex justify-content-between align-items-center mb-4">
					<h2>Alertas de Segurança</h2>
					<div>
						<span class="badge bg-success p-2">
							<i class="bi bi-person-circle"></i> <span sec:authentication="name"></span>
						</span>
					</div>
				</div>

				<!-- Quick Actions -->
				<div class="row mb-4">
					<div class="col-12">
						<div class="card">
							<div class="card-body">
								<h5 class="card-title">Ações Rápidas</h5>
								<div class="d-flex gap-2">
									<a href="/alertas/novo" class="btn btn-warning">
										<i class="bi bi-plus-circle"></i> Novo Alerta
									</a>
								</div>
							</div>
						</div>
					</div>
				</div>

				<!-- Filtros -->
				<div class="card filter-card mb-4">
					<div class="card-body">
						<h5><i class="bi bi-funnel"></i> Filtrar Alertas</h5>
						<div class="row g-3">
							<div class="col-md-4">
								<label class="form-label">Tipo</label>
								<select class="form-select" id="tipoFiltro">
									<option value="">Todos</option>
									<option value="FURTO">Furto</option>
									<option value="ROUBO">Roubo</option>
									<option value="ATIVIDADE_SUSPEITA">Atividade Suspeita</option>
									<option value="FALTA_ILUMINACAO">Falta de Iluminação</option>
									<option value="OUTRO">Outro</option>
								</select>
							</div>
							<div class="col-md-4">
								<label class="form-label">Data Início</label>
								<input type="date" class="form-control" id="dataInicio">
							</div>
							<div class="col-md-4">
								<label class="form-label">Data Fim</label>
								<input type="date" class="form-control" id="dataFim">
							</div>
							<div class="col-12">
								<button class="btn btn-primary" onclick="filtrar()">
									<i class="bi bi-search"></i> Filtrar
								</button>
								<button class="btn btn-secondary" onclick="limparFiltros()">
									<i class="bi bi-eraser"></i> Limpar
								</button>
							</div>
						</div>
					</div>
				</div>

				<!-- Lista de Alertas -->
				<div id="alertasContainer" class="row">
					<div class="col-12 text-center py-5">
						<div class="spinner-border text-primary" role="status">
							<span class="visually-hidden">Carregando...</span>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Modal Ver Mapa -->
	<div class="modal fade" id="modalMapa" tabindex="-1">
		<div class="modal-dialog modal-lg">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title"><i class="bi bi-map"></i> <span id="modalMapaTitulo"></span></h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>
				<div class="modal-body p-0">
					<div id="mapaContainer" style="height: 420px; width: 100%;"></div>
				</div>
				<div class="modal-footer">
					<small class="text-muted me-auto"><i class="bi bi-info-circle"></i> Mapa via OpenStreetMap</small>
					<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
	<script>
        let alertas = [];

        // FIX 3/4: Ler o token CSRF do cookie (gerado pelo CookieCsrfTokenRepository)
        function getCsrfToken() {
            const match = document.cookie.match(/XSRF-TOKEN=([^;]+)/);
            return match ? decodeURIComponent(match[1]) : null;
        }

        // FIX 3/4: Wrapper para requisições POST com CSRF
        function postComCsrf(url) {
            return fetch(url, {
                method: 'POST',
                headers: {
                    'X-XSRF-TOKEN': getCsrfToken()
                },
                credentials: 'same-origin'
            });
        }

        function carregarAlertas() {
            fetch('/api/alertas')
                .then(response => response.json())
                .then(data => {
                    alertas = data;
                    aplicarFiltros();
                })
                .catch(error => {
                    console.error('Erro ao carregar alertas:', error);
                    document.getElementById('alertasContainer').innerHTML =
                        '<div class="col-12"><div class="alert alert-danger">Erro ao carregar alertas</div></div>';
                });
        }

        function formatarData(data) {
            return new Date(data).toLocaleString('pt-BR');
        }

        function getBadgeClass(tipo) {
            const classes = {
                'FURTO': 'badge-furto',
                'ROUBO': 'badge-roubo',
                'ATIVIDADE_SUSPEITA': 'badge-atividade-suspeita',
                'FALTA_ILUMINACAO': 'badge-falta-iluminacao',
                'OUTRO': 'badge-outro'
            };
            return classes[tipo] || 'bg-secondary';
        }

        function aplicarFiltros() {
            const tipo = document.getElementById('tipoFiltro').value;
            const dataInicio = document.getElementById('dataInicio').value;
            const dataFim = document.getElementById('dataFim').value;

            let filtrados = alertas;

            if (tipo) {
                filtrados = filtrados.filter(a => a.tipo === tipo);
            }
            if (dataInicio) {
                filtrados = filtrados.filter(a => new Date(a.dataHora) >= new Date(dataInicio));
            }
            if (dataFim) {
                const fim = new Date(dataFim);
                fim.setHours(23, 59, 59);
                filtrados = filtrados.filter(a => new Date(a.dataHora) <= fim);
            }

            const container = document.getElementById('alertasContainer');
            if (filtrados.length === 0) {
                container.innerHTML =
                    '<div class="col-12"><div class="alert alert-info text-center">Nenhum alerta encontrado.</div></div>';
                return;
            }

            container.innerHTML = filtrados.map(alerta => `
                <div class="col-md-6 col-lg-4 mb-3">
                    <div class="card alert-card h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title mb-0">${alerta.titulo || 'Sem título'}</h5>
                                <span class="badge ${getBadgeClass(alerta.tipo)} ms-1">
                                    ${alerta.tipo.replace(/_/g, ' ')}
                                </span>
                            </div>
                            <hr class="my-2">
                            <!-- FIX 2: Mostrar campo localizacao (endereço) em vez de coordenadas -->
                            <div class="small mb-1">
                                <i class="bi bi-geo-alt text-danger"></i>
                                <strong>${alerta.localizacao || 'Localização não informada'}</strong>
                            </div>
                            <div class="small mb-1">
                                <i class="bi bi-clock text-secondary"></i> ${formatarData(alerta.dataHora)}
                            </div>
                            <div class="small mb-1">
                                <i class="bi bi-person text-primary"></i> ${alerta.nomeUsuario}
                            </div>
                            ${alerta.descricao
                                ? `<div class="small text-muted mt-1 mb-2">${alerta.descricao}</div>`
                                : ''}
                            <hr class="my-2">
                            <!-- FIX 3: Botões Confirmar e Denunciar com CSRF -->
                            <div class="d-flex gap-2 flex-wrap">
                                <button
                                    onclick="confirmarAlerta(${alerta.id})"
                                    class="btn btn-outline-success btn-sm flex-grow-1"
                                    title="Sinalizar que este alerta é verdadeiro">
                                    <i class="bi bi-check-circle"></i> Confirmar
                                    <span class="badge bg-success ms-1">${alerta.confirmacoes || 0}</span>
                                </button>
                                <button
                                    onclick="denunciarAlerta(${alerta.id})"
                                    class="btn btn-outline-danger btn-sm flex-grow-1"
                                    title="Denunciar conteúdo falso ou ofensivo">
                                    <i class="bi bi-flag"></i> Denunciar
                                    <span class="badge bg-danger ms-1">${alerta.denuncias || 0}</span>
                                </button>
                                ${(alerta.latitude && alerta.longitude) ? `
                                <button
                                    onclick="verMapa(${alerta.latitude}, ${alerta.longitude}, '${alerta.titulo.replace(/'/g, "\\'")}')"
                                    class="btn btn-outline-primary btn-sm flex-grow-1"
                                    title="Ver localização no mapa">
                                    <i class="bi bi-map"></i> Ver Mapa
                                </button>` : ''}
                                <!-- FIX 4: Excluir apenas para quem tem permissão (podeExcluir vem do backend) -->
                                ${alerta.podeExcluir ? `
                                <button
                                    onclick="excluirAlerta(${alerta.id})"
                                    class="btn btn-outline-dark btn-sm flex-grow-1"
                                    title="Excluir este alerta">
                                    <i class="bi bi-trash"></i> Excluir
                                </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filtrar() {
            aplicarFiltros();
        }

        function limparFiltros() {
            document.getElementById('tipoFiltro').value = '';
            document.getElementById('dataInicio').value = '';
            document.getElementById('dataFim').value = '';
            aplicarFiltros();
        }

        // FIX 3: Confirmar alerta com CSRF token
        function confirmarAlerta(id) {
            if (confirm('Confirmar este alerta como verdadeiro?')) {
                postComCsrf(`/alertas/${id}/confirmar`)
                    .then(response => {
                        if (response.ok) {
                            mostrarToast('Alerta confirmado com sucesso!', 'success');
                            carregarAlertas();
                        } else {
                            mostrarToast('Erro ao confirmar alerta. Tente novamente.', 'danger');
                        }
                    })
                    .catch(() => mostrarToast('Erro de conexão ao confirmar alerta.', 'danger'));
            }
        }

        // FIX 3: Denunciar alerta com CSRF token
        function denunciarAlerta(id) {
            if (confirm('Denunciar este alerta como falso ou inadequado?')) {
                postComCsrf(`/alertas/${id}/denunciar`)
                    .then(response => {
                        if (response.ok) {
                            mostrarToast('Alerta denunciado. Obrigado pela contribuição!', 'warning');
                            carregarAlertas();
                        } else {
                            mostrarToast('Erro ao denunciar alerta. Tente novamente.', 'danger');
                        }
                    })
                    .catch(() => mostrarToast('Erro de conexão ao denunciar alerta.', 'danger'));
            }
        }

        // Excluir alerta via DELETE /api/alertas/{id}
        // Usa /api/** que ignora CSRF no SecurityConfig — resolve o 403
        function excluirAlerta(id) {
            if (confirm('Excluir este alerta permanentemente? Esta ação não pode ser desfeita.')) {
                fetch(`/api/alertas/${id}`, {
                    method: 'DELETE',
                    credentials: 'same-origin'
                })
                    .then(response => {
                        if (response.ok) {
                            mostrarToast('Alerta excluído com sucesso!', 'success');
                            carregarAlertas();
                        } else {
                            response.json().then(data => {
                                mostrarToast('Erro ao excluir: ' + (data.message || 'sem permissão.'), 'danger');
                            }).catch(() => mostrarToast('Erro ao excluir alerta.', 'danger'));
                        }
                    })
                    .catch(() => mostrarToast('Erro de conexão ao excluir alerta.', 'danger'));
            }
        }

        // Toast não-bloqueante (substitui alert())
        function mostrarToast(mensagem, tipo) {
            const id = 'toast-' + Date.now();
            const toastHtml = `
                <div id="${id}" class="toast align-items-center text-white bg-${tipo} border-0 position-fixed bottom-0 end-0 m-3"
                     role="alert" style="z-index:9999">
                    <div class="d-flex">
                        <div class="toast-body">${mensagem}</div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto"
                                data-bs-dismiss="toast"></button>
                    </div>
                </div>`;
            document.body.insertAdjacentHTML('beforeend', toastHtml);
            const el = document.getElementById(id);
            const bsToast = new bootstrap.Toast(el, { delay: 3500 });
            bsToast.show();
            el.addEventListener('hidden.bs.toast', () => el.remove());
        }

        // ── Ver Mapa ──────────────────────────────────────────────────
        let mapaInstance = null;
        let mapaLat = null, mapaLng = null, mapaTitulo = null;

        function verMapa(lat, lng, titulo) {
            mapaLat = lat; mapaLng = lng; mapaTitulo = titulo;
            document.getElementById('modalMapaTitulo').textContent = titulo;

            // Destrói instância anterior antes de abrir
            if (mapaInstance) { mapaInstance.remove(); mapaInstance = null; }

            const modal = new bootstrap.Modal(document.getElementById('modalMapa'));
            modal.show();
        }

        // Inicializa o mapa APÓS o modal estar 100% visível (animação concluída)
        document.getElementById('modalMapa').addEventListener('shown.bs.modal', function () {
            if (mapaInstance) { mapaInstance.remove(); mapaInstance = null; }

            mapaInstance = L.map('mapaContainer', { zoomControl: true }).setView([mapaLat, mapaLng], 17);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                maxZoom: 19
            }).addTo(mapaInstance);

            // Pin vermelho com ícone Bootstrap Icons
            const icone = L.divIcon({
                html: '<i class="bi bi-geo-alt-fill" style="font-size:2.2rem;color:#dc3545;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));"></i>',
                iconSize:   [36, 36],
                iconAnchor: [18, 36],
                popupAnchor:[0, -36],
                className: ''
            });

            L.marker([mapaLat, mapaLng], { icon: icone })
                .addTo(mapaInstance)
                .bindPopup(`<strong>${mapaTitulo}</strong><br><small>Lat: ${mapaLat.toFixed(6)}, Lng: ${mapaLng.toFixed(6)}</small>`)
                .openPopup();

            // Força recalculo de tamanho — resolve o problema do tile branco
            setTimeout(() => mapaInstance.invalidateSize(), 200);
        });

        // Destrói o mapa ao fechar o modal para evitar memory leak
        document.getElementById('modalMapa').addEventListener('hidden.bs.modal', function () {
            if (mapaInstance) { mapaInstance.remove(); mapaInstance = null; }
        });

        carregarAlertas();
    </script>
</body>
</html>
