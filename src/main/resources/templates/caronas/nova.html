<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oferecer Carona - Segurança Fatec ZL</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
.sidebar {
	min-height: 100vh;
	background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
	color: white;
}

.sidebar a {
	color: rgba(255, 255, 255, 0.8);
	text-decoration: none;
	padding: 10px 15px;
	display: block;
	transition: all 0.3s;
}

.sidebar a:hover, .sidebar a.active {
	background: rgba(255, 255, 255, 0.2);
	color: white;
	border-radius: 10px;
}

.btn-submit {
	background: linear-gradient(135deg, #28a745, #20c997);
	border: none;
	padding: 12px 30px;
	border-radius: 25px;
	font-weight: bold;
	color: white;
}

.btn-submit:hover {
	transform: scale(1.05);
}

.sidebar .logout-btn {
	color: rgba(255, 255, 255, 0.8);
	text-decoration: none;
	padding: 10px 15px;
	display: block;
	transition: all 0.3s;
	width: 100%;
	text-align: left;
	background: none;
	border: none;
	font-size: 1rem;
}

.sidebar .logout-btn:hover {
	background: rgba(255, 255, 255, 0.2);
	color: white;
	border-radius: 10px;
}
</style>
</head>
<body>
	<div class="container-fluid">
		<div class="row">
			<!-- Sidebar -->
			<div class="col-md-3 col-lg-2 px-0 sidebar">
				<div class="text-center py-4">
					<i class="bi bi-shield-shaded display-3"></i>
					<h4 class="mt-2">Segurança Fatec ZL</h4>
				</div>
				<nav class="nav flex-column px-3">
					<a href="/dashboard"> <i class="bi bi-house-door"></i> Dashboard
					</a> 
					<a href="/alertas"> <i class="bi bi-exclamation-triangle"></i> Alertas
					</a> 
					<a href="/caronas" class="active"> <i class="bi bi-car-front"></i> Caronas
					</a> 
					<a href="/estatisticas"> <i class="bi bi-bar-chart"></i> Estatísticas
					</a> 
					<a href="/onibus"><i class="bi bi-bus-front-fill"></i> Ônibus em Tempo Real
					</a>
					<a href="/perfil"> <i class="bi bi-person"></i> Meu Perfil
					</a> 
					<form th:action="@{/logout}" method="post">
						<button type="submit" class="logout-btn">
							<i class="bi bi-box-arrow-right"></i> Sair
						</button>
					</form>
				</nav>
			</div>

			<!-- Main Content -->
			<div class="col-md-9 col-lg-10 px-4 py-3">
				<div class="d-flex justify-content-between align-items-center mb-4">
					<h2>Oferecer Carona</h2>
					<div>
						<span class="badge bg-success p-2"> <i
							class="bi bi-person-circle"></i> <span sec:authentication="name"></span>
						</span>
					</div>
				</div>

				<div th:if="${erro}" class="alert alert-danger d-flex align-items-center mb-3" role="alert">
					<i class="bi bi-exclamation-triangle-fill me-2"></i>
					<span th:text="${erro}"></span>
				</div>

				<div class="card">
					<div class="card-body p-4">
						<form id="caronaForm" method="post" th:action="@{/caronas/nova}" th:object="${carona}">
							<div class="mb-3">
								<label class="fw-bold">Origem</label>
								<input type="text" class="form-control" th:field="*{origem}" required>
							</div>
							<div class="mb-3">
								<label class="fw-bold">Destino</label>
								<input type="text" class="form-control" th:field="*{destino}" required>
							</div>
							<div class="mb-3">
								<label class="fw-bold">Horário de Saída</label>
								<input type="datetime-local" class="form-control" th:field="*{horarioSaida}" required>
							</div>
							<div class="mb-3">
								<label class="fw-bold">Vagas Disponíveis</label>
								<select class="form-select" th:field="*{vagasDisponiveis}" required>
									<option value="1">1 vaga</option>
									<option value="2">2 vagas</option>
									<option value="3">3 vagas</option>
									<option value="4">4 vagas</option>
								</select>
							</div>
							<div class="mb-3">
								<label class="fw-bold">Modelo do Veículo</label>
								<input type="text" class="form-control" th:field="*{veiculoModelo}" required>
							</div>
							<div class="mb-3">
								<label class="fw-bold">Placa do Veículo</label>
								<input type="text" class="form-control" th:field="*{veiculoPlaca}" required>
							</div>
							<div class="mb-3">
								<label class="fw-bold">Observações (opcional)</label>
								<textarea class="form-control" th:field="*{observacoes}" rows="3"></textarea>
							</div>

							<div class="alert alert-warning">
								<i class="bi bi-shield-exclamation"></i> O sistema apenas conecta motoristas e passageiros. Cada um é responsável pela sua segurança.
							</div>
							<button type="submit" class="btn btn-submit"><i class="bi bi-send"></i> Publicar Carona</button>
							<a href="/caronas" class="btn btn-secondary">Cancelar</a>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
